{% load static tailwind_tags %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="{% static 'home/images/car2.png' %}" />
    {% tailwind_css %}
    <style>
      input:not(.text-white):not([data-keep-form-color="true"]),
      select:not(.text-white):not([data-keep-form-color="true"]),
      textarea:not(.text-white):not([data-keep-form-color="true"]) {
        color: #111827;
        -webkit-text-fill-color: #111827;
      }

      input:not(.text-white):not([data-keep-form-color="true"])::placeholder,
      textarea:not(.text-white):not([data-keep-form-color="true"])::placeholder,
      select:not(.text-white):not([data-keep-form-color="true"]):invalid {
        color: #4b5563;
        opacity: 1;
      }

      input:not(.text-white):not([data-keep-form-color="true"]):-webkit-autofill,
      input:not(.text-white):not([data-keep-form-color="true"]):-webkit-autofill:hover,
      input:not(.text-white):not([data-keep-form-color="true"]):-webkit-autofill:focus,
      textarea:not(.text-white):not([data-keep-form-color="true"]):-webkit-autofill,
      textarea:not(.text-white):not([data-keep-form-color="true"]):-webkit-autofill:focus,
      select:not(.text-white):not([data-keep-form-color="true"]):-webkit-autofill,
      select:not(.text-white):not([data-keep-form-color="true"]):-webkit-autofill:focus {
        -webkit-text-fill-color: #111827;
        box-shadow: 0 0 0px 1000px #ffffff inset;
        transition: background-color 9999s ease-in-out 0s;
      }
    </style>
  </head>

  <body class="leading-normal tracking-normal">
    {% block content %}{% endblock %}

    <script
      src="https://kit.fontawesome.com/dbc3492b26.js"
      crossorigin="anonymous"
    ></script>
    <script src="{% static 'home/js/achievements.js' %}"></script>
    <script src="{% static 'home/js/vehicleScroll.js' %}"></script>
    <script src="{% static 'home/js/password.js' %}"></script>
    <script src="{% static 'home/js/carModal.js' %}"></script>
    <script src="{% static 'home/js/bookingValidation.js' %}"></script>
    <script src="{% static 'home/js/cancelCar.js' %}"></script>
    <script src="{% static 'home/js/signup.js' %}"></script>
    <script src="{% static 'home/js/_passwordCheck.js' %}"></script>
    <script src="{% static 'home/js/liveClock.js' %}"></script>
    <script src="{% static 'home/js/backButton.js' %}"></script>
  </body>
</html>
