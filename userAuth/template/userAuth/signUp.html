{% extends 'base.html' %} 

{% block title %}Sign Up - Diako Rental Cars{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-xl shadow-xl p-8">
  <h2 class="text-2xl font-bold text-blue-950 mb-6 text-center">
    Create Account
  </h2>

  <form method="post" class="space-y-5">
    {% csrf_token %}

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <input
        type="text"
        name="first_name"
        placeholder="First Name"
        class="px-4 py-3 border rounded-lg focus:ring-2 focus:ring-orange-400"
      />
      <input
        type="text"
        name="last_name"
        placeholder="Last Name"
        class="px-4 py-3 border rounded-lg focus:ring-2 focus:ring-orange-400"
      />
    </div>

    <input
      type="email"
      name="email"
      placeholder="Email Address"
      class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-orange-400"
    />

    <input
      type="text"
      name="phone"
      placeholder="Phone Number"
      class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-orange-400"
    />

    <input
      type="password"
      name="password1"
      placeholder="Password"
      class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-orange-400"
    />

    <input
      type="password"
      name="password2"
      placeholder="Confirm Password"
      class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-orange-400"
    />

    <button
      type="submit"
      class="w-full bg-orange-400 hover:bg-orange-500 text-white font-semibold py-3 rounded-lg transition"
    >
      Create Account
    </button>

    <p class="text-center text-sm text-gray-600 mt-4">
      Already have an account?
      <a href="{% url 'login' %}" class="text-orange-400 font-semibold hover:underline">
        Login
      </a>
    </p>
  </form>
</div>
{% endblock %}
