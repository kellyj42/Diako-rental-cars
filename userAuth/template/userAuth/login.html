{% extends 'base.html' %} 

{% block title %}Login - Diako Rental Cars{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-xl p-8">
  <h2 class="text-2xl font-bold text-blue-950 mb-6 text-center">
    Sign In
  </h2>

  <form method="post" class="space-y-5">
    {% csrf_token %}

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Email or Username
      </label>
      <input
        type="text"
        name="username"
        class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-orange-400 focus:outline-none"
        placeholder="Enter your email"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Password
      </label>
      <input
        type="password"
        name="password"
        class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-orange-400 focus:outline-none"
        placeholder="••••••••"
      />
    </div>

    <div class="flex justify-between items-center text-sm">
      <label class="flex items-center gap-2">
        <input type="checkbox" class="rounded border-gray-300">
        Remember me
      </label>
      <a href="{% url 'password_reset' %}" class="text-orange-400 hover:underline">
        Forgot password?
      </a>
    </div>

    <button
      type="submit"
      class="w-full bg-orange-400 hover:bg-orange-500 text-white font-semibold py-3 rounded-lg transition"
    >
      Login
    </button>

    <p class="text-center text-sm text-gray-600 mt-4">
      Don’t have an account?
      <a href="{% url 'register' %}" class="text-orange-400 font-semibold hover:underline">
        Sign up
      </a>
    </p>
  </form>
</div>
{% endblock %}
