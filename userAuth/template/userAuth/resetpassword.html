{% extends 'base.html' %} 

{% block title %}Reset Password - Diako Rental Cars{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-xl p-8">
  <h2 class="text-2xl font-bold text-blue-950 mb-6 text-center">
    Reset Password
  </h2>

  <form method="post" class="space-y-5">
    {% csrf_token %}

    <input
      type="password"
      name="new_password1"
      placeholder="New Password"
      class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-orange-400"
    />

    <input
      type="password"
      name="new_password2"
      placeholder="Confirm New Password"
      class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-orange-400"
    />

    <button
      type="submit"
      class="w-full bg-orange-400 hover:bg-orange-500 text-white font-semibold py-3 rounded-lg transition"
    >
      Reset Password
    </button>
  </form>
</div>
{% endblock %}
