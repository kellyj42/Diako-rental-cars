{% if user.is_authenticated %}
<div class="mt-5 w-full">
  <form
    method="post"
    action="{% url 'bookings:confirm_booking' booking.id %}"
    class="mx-auto px-4 sm:px-6 lg:px-8"
  >
    {% csrf_token %} {% if require_terms %}
    <div class="mb-4">
      <label class="flex items-start">
        <input
          type="checkbox"
          name="agree_terms"
          id="agreeTermsConfirm"
          required
          class="mt-1 mr-2"
        />
        <span class="text-sm text-gray-700">
          I agree to the
          <a
            href="{% url 'home:terms' %}"
            class="text-blue-600 hover:text-blue-800"
            >Terms & Conditions</a
          >
          and
          <a
            href="{% url 'home:privacy' %}"
            class="text-blue-600 hover:text-blue-800"
            >Privacy Policy</a
          >
        </span>
      </label>
    </div>
    {% endif %}
    <button
      type="submit"
      class="w-full bg-linear-to-r from-blue-600 to-blue-800 text-white text-xl font-bold py-4 rounded-2xl shadow-xl hover:from-blue-700 hover:to-blue-900 transition-all duration-300 flex items-center justify-center gap-3"
    >
      <i class="fas fa-check-circle text-2xl"></i>
      Confirm Order
    </button>
  </form>
</div>
{% else %}
<div class="mt-5 w-full">
  <a
    href="{% url 'userAuth:login' %}?next={% url 'bookings:booking_details' booking.id %}"
    class="mx-auto px-4 sm:px-6 lg:px-8"
  >
    <button
      class="w-full bg-linear-to-r from-blue-600 to-blue-800 text-white text-xl font-bold py-4 rounded-2xl shadow-xl hover:from-blue-700 hover:to-blue-900 transition-all duration-300 flex items-center justify-center gap-3"
    >
      <i class="fas fa-check-circle text-2xl"></i>
      Sign In to Confirm Order
    </button>
  </a>
</div>
{% endif %}
