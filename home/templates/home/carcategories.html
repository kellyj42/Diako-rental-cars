{% load static %}
<section class="bg-white py-16">
  <div class="max-w-7xl mx-auto px-6">
    <!-- Section Header -->
    <div class="text-center max-w-3xl mx-auto mb-12">
      <h2 class="text-4xl font-bold text-blue-950 mb-4">
        Vehicle <span class="text-orange-400">Categories</span>
      </h2>
      <p class="text-gray-600">
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Ut amet nemo
        expedita asperiores commodi accusantium at cum harum.
      </p>
    </div>

    <!-- Categories Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <!-- Vehicle Card -->
      <div
        class="bg-white border border-gray-200 rounded-xl shadow-md hover:shadow-xl transition overflow-hidden"
      >
        <img
          src="{% static 'home/car3.jpg' %}" 
          alt="Mercedes Benz R3"
          class="w-full h-52 object-contain bg-gray-100"
        />

        <div class="p-6">
          <h4 class="text-xl font-semibold text-gray-900 mb-2">
            Mercedes Benz R3
          </h4>

          <!-- Rating -->
          <div class="flex items-center gap-2 mb-4 text-sm text-gray-600">
            <span>4.5 Review</span>
            <div class="flex text-orange-400">
              <i class="fas fa-star"></i>
              <i class="fas fa-star"></i>
              <i class="fas fa-star"></i>
              <i class="fas fa-star"></i>
              <i class="fas fa-star text-gray-300"></i>
            </div>
          </div>

          <!-- Price -->
          <div class="mb-4">
            <span
              class="inline-block bg-blue-950 text-white px-4 py-2 rounded-full font-semibold"
            >
              $99 / Day
            </span>
          </div>

          <!-- Specs -->
          <div class="grid grid-cols-3 gap-3 text-sm text-gray-600 mb-6">
            <div class="flex items-center gap-1">
              <i class="fa fa-users text-orange-400"></i>4 Seat
            </div>
            <div class="flex items-center gap-1">
              <i class="fa fa-car text-orange-400"></i>AT/MT
            </div>
            <div class="flex items-center gap-1">
              <i class="fa fa-gas-pump text-orange-400"></i>Petrol
            </div>

            <div class="flex items-center gap-1">
              <i class="fa fa-calendar text-orange-400"></i>2015
            </div>
            <div class="flex items-center gap-1">
              <i class="fa fa-cogs text-orange-400"></i>AUTO
            </div>
            <div class="flex items-center gap-1">
              <i class="fa fa-road text-orange-400"></i>27K
            </div>
          </div>

          <!-- Button -->
          <a
            href="#"
            class="block text-center bg-orange-400 hover:bg-orange-500 text-white font-semibold py-3 rounded-xl transition"
          >
            Book Now
          </a>
        </div>
      </div>

      <!-- Duplicate this card for other vehicles -->
      <!-- Just change image, name, price, and rating -->
    </div>
  </div>
</section>
