<!-- Top Navigation Bar -->
<header class="sticky top-0 z-40 bg-white shadow-md">
  <div class="flex items-center justify-between px-6 py-4">
    <!-- Left Side: Menu Toggle & Search -->
    <div class="flex items-center space-x-4">
      <button
        id="mobileMenuToggle"
        class="text-gray-700 hover:text-blue-600 lg:hidden"
      >
        <i class="fas fa-bars text-xl"></i>
      </button>

      <div class="relative hidden md:block">
        <input
          type="text"
          placeholder="Search bookings, customers, cars..."
          class="pl-10 pr-4 py-2 w-80 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        />
        <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
      </div>
    </div>

    <!-- Right Side: User + Logout -->
    <div class="flex items-center space-x-6">
      <div class="text-right">
        <p class="text-sm font-medium text-gray-900">{{ request.user.get_full_name|default:request.user.email }}</p>
        <p class="text-xs text-gray-500">{% if user.is_superuser %}Super Admin{% else %}Staff{% endif %}</p>
      </div>
      <form method="post" action="{% url 'userAuth:logout' %}">
        {% csrf_token %}
        <button class="text-sm font-semibold text-red-500 hover:text-red-700">Logout</button>
      </form>
      <!-- User Menu -->
      <div class="relative">
        <button id="userMenuBtn" class="flex items-center space-x-3">
          <div class="hidden md:block text-left">
            <p class="font-medium text-gray-900">
              {{ request.user.get_full_name|default:request.user.email }}
            </p>
            <p class="text-sm text-gray-600">
              {% if user.is_superuser %}Super Admin{% else %}Staff{% endif %}
            </p>
          </div>
          
        </button>

        <!-- User Dropdown -->
        
      </div>
    </div>
  </div>
</header>
