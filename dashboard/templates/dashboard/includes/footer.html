<!-- Footer -->
<footer class="bg-white border-t border-gray-200 p-6 mt-8">
  <div class="flex flex-col md:flex-row justify-between items-center gap-3">
    <div class="mb-4 md:mb-0">
      <p class="text-gray-600">
        © {% now "Y" %} Daiko Rentals. All rights reserved.
      </p>
      <p class="text-sm text-gray-500 mt-1">
        Admin Dashboard v{{ dashboard_version|default:'2.0' }} • Updated: {{footer_updated|date:'M d, Y H:i'|default:'Just now' }}
      </p>
      <p class="text-xs text-gray-400 mt-1">
        Support:
        <a href="mailto:{{ footer_support_email }}" class="hover:text-blue-600"
          >{{ footer_support_email }}</a
        >
      </p>
    </div>
    <div class="flex items-center space-x-6">
      <a
        href="{% url 'home:privacy' %}"
        class="text-gray-600 hover:text-blue-600"
        >Privacy Policy</a
      >
      <a href="#" class="text-gray-600 hover:text-blue-600">Terms of Service</a>
      <a href="#" class="text-gray-600 hover:text-blue-600">Help Center</a>
      <button
        id="refreshData"
        class="flex items-center text-blue-600 hover:text-blue-800"
      >
        <i class="fas fa-sync-alt mr-2"></i>
        Refresh Data
      </button>
    </div>
  </div>
</footer>
